services:
  postgres:
    image: postgres:16
    container_name: isp-map-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: isp_map_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
